# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# APPLICATION NAME
# ===============================
spring.application.name=E-commerce Gym Equipment StoreBackend

# ===============================
# DATABASE CONFIG (Supabase/PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://<SUPABASE_DB_HOST>:5432/<SUPABASE_DB_NAME>
spring.datasource.username=<SUPABASE_DB_USER>
spring.datasource.password=<SUPABASE_DB_PASSWORD>
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.za.ac.youthVend=DEBUG

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=YouthVendSecretKeyForJWTTokenGeneration2025
jwt.expiration=86400000   # 24 hours in milliseconds

# ===============================
# MAIL CONFIGURATION (for OTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hustleside@gmail.com
spring.mail.password=naiouknidopsnrst
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# OTP CONFIGURATION
# ===============================
otp.expiration.minutes=10
