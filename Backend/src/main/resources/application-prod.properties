# ===========================================
# Production Profile Configuration
# ===========================================
# Active when: spring.profiles.active=prod
# ALL sensitive values MUST come from environment variables
# ===========================================

# --- Database Configuration (Production) ---
# ALL database credentials are injected via environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/Hibernate Settings (Production) ---
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- CORS Configuration (Production) ---
# FRONTEND_URL is injected via environment variable
spring.web.cors.allowed-origins=${FRONTEND_URL}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# --- JWT Configuration (Production) ---
# JWT secret is injected via environment variable - MUST be at least 256 bits
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# --- Email Configuration (Production) ---
# Email credentials are injected via environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- Frontend URL (Production) ---
app.frontend.url=${FRONTEND_URL}

# --- Logging (Minimal for Production) ---
logging.level.za.ac.youthVend=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=INFO