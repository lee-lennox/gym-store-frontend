# ===========================================
# Development Profile Configuration
# ===========================================
# Active when: spring.profiles.active=dev
# Used for LOCAL development only
# ===========================================

# --- Database Configuration (Local) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/gymstore
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/Hibernate Debug Settings ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- CORS Configuration (Local Development) ---
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# --- JWT Configuration (Development Secret) ---
# WARNING: This is for development only. Use strong secrets in production.
jwt.secret=DevSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256AlgorithmChangeInProd
jwt.expiration=86400000

# --- Email Configuration (Development) ---
# For development, you can use Mailtrap or a test SMTP server
# spring.mail.host=smtp.mailtrap.io
# spring.mail.port=2525
# spring.mail.username=your-mailtrap-username
# spring.mail.password=your-mailtrap-password
#
# For Gmail testing (not recommended for production):
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-dev-email@gmail.com
spring.mail.password=your-dev-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --- Frontend URL (Development) ---
app.frontend.url=http://localhost:5173

# --- Logging (Verbose for Development) ---
logging.level.za.ac.youthVend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG