# ===========================================
# Base Application Configuration
# ===========================================
# This file contains shared settings for all environments.
# Environment-specific settings are in:
#   - application-dev.properties (development)
#   - application-prod.properties (production)
# ===========================================

# Application Name
spring.application.name=gymstore-backend

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Common JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/products

# Password Reset Settings
app.password.reset.token.expiry.minutes=15
app.password.reset.max.attempts.per.hour=6

# ===========================================
# Active Profile Configuration
# ===========================================
# Uncomment ONE of the following to set the default profile:
# spring.profiles.active=dev
# spring.profiles.active=prod
#
# For production, it's recommended to set the profile via:
#   - Environment variable: SPRING_PROFILES_ACTIVE=prod
#   - Command line: java -jar app.jar --spring.profiles.active=prod
#   - Docker: -e SPRING_PROFILES_ACTIVE=prod
# ===========================================