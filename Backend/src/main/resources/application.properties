# =====================
# DATABASE CONFIGURATION
# =====================
# Database URL - override via DATABASE_URL environment variable
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gymstore}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =====================
# JWT CONFIGURATION
# =====================
# JWT Secret - MUST be overridden in production (min 32 characters)
jwt.secret=${JWT_SECRET:DevSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=86400000

# =====================
# FILE UPLOAD CONFIGURATION
# =====================
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# =====================
# FRONTEND URL (CORS)
# =====================
FRONTEND_URL=${FRONTEND_URL:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}

# =====================
# EMAIL CONFIGURATION (SMTP)
# =====================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:dev@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:dev-password}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}

# =====================
# LOGGING CONFIGURATION
# =====================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.za.ac.youthVend=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework=${LOG_LEVEL_SPRING:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:INFO}