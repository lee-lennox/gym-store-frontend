# Netlify configuration for SPA routing
# This file configures Netlify to properly handle React Router routes

[build]
  # Set the base directory for the build process
  base = "frontend"
  
  # Directory with the React app (where package.json is)
  publish = "build"
  
  # Build command
  command = "npm run build"

# SPA redirect rule - all routes should serve index.html
# This allows React Router to handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets for better performance
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"