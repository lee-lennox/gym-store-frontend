version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gymstore-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      - DATABASE_URL=jdbc:postgresql://postgres:5432/gymstore
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      # JWT Secret - Generate a strong secret for production!
      # Example: openssl rand -base64 64
      - JWT_SECRET=DevSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
      # Email Configuration (SMTP)
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=dev@gmail.com
      - SPRING_MAIL_PASSWORD=dev-password
      # Frontend URL for CORS
      - FRONTEND_URL=http://localhost:3000,http://localhost:5173
      # File Upload Directory
      - FILE_UPLOAD_DIR=/app/uploads
      # Hibernate Settings
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=false
      # Logging
      - LOG_LEVEL=INFO
      - LOG_LEVEL_APP=INFO
      - LOG_LEVEL_SPRING=INFO
      - LOG_LEVEL_SECURITY=INFO
      - LOG_LEVEL_HIBERNATE=INFO
    depends_on:
      - postgres
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - gymstore-network

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=gymstore
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gymstore-network

volumes:
  postgres_data:
  backend_uploads:

networks:
  gymstore-network:
    driver: bridge